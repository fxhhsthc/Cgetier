        body {

            line-height: 1.4;
            color: var(--text-color);
            background: var(--bg-color);
            min-height: 100vh;

        #app {

            background: var(--card-bg);

        .header {

            justify-content: center;

        .category-pill {

            border-radius: 16px;
            background-color: var(--primary-color);
            color: white;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all var(--transition-speed) ease;
        }
        
        .category-pill:hover {
            background-color: var(--secondary-color);
            transform: translateY(-1px);
        }
        
        .category-pill.active {
            background-color: var(--secondary-color);
            transform: scale(1.05);
        }
        
        .url-list {
            list-style: none;
        }
        
        .url-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            animation: fadeIn 0.4s ease-out;
            transition: all var(--transition-speed) ease;
        }
        
        .url-item:last-child {
            border-bottom: none;
        }
        
        .url-item:hover {
            background-color: var(--hover-bg);
            transform: translateX(3px);
        }
        
        .url-content {
            flex: 1;
            margin-right: 12px;
            min-width: 0;
        }
        
        .url-name {
            display: block;
            font-weight: 600;
            color: var(--text-color);
            text-decoration: none;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color var(--transition-speed) ease;
        }
        
        .url-name:hover {
            color: var(--primary-color);
        }
        
        .url-description {
            display: block;
            color: var(--gray-color);
            font-size: 0.85rem;
            margin-bottom: 4px;
            word-break: break-word;
            overflow-wrap: break-word;
        }
        
        .url-category {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 10px;
            background-color: var(--primary-color);
            color: white;
            font-size: 0.75rem;
            margin-right: 6px;
        }
        
        .url-time {
            display: block;
            color: var(--gray-color);
            font-size: 0.75rem;
            margin-top: 4px;
        }
        
        .url-actions {
            display: flex;
            gap: 6px;
            opacity: 0.7;
            transition: opacity var(--transition-speed) ease;
        }
        
        .url-item:hover .url-actions {
            opacity: 1;
        }
        
        .icon-btn {
            padding: 6px;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-size: 0.9rem;
            transition: all var(--transition-speed) ease;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gray-color);
            background: transparent;
        }
        
        .icon-btn:hover {
            background: var(--hover-bg);
            color: var(--primary-color);
        }

        }
        
        .image-btn:hover {

        .description-btn:hover {

        }

            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.3s ease-out;

        .modal-content {

            height: 26px;

            justify-content: space-around;
            align-items: center;
            padding: 0;
            z-index: 10;

            width: 20px;
            height: 2px;
            background-color: var(--header-text);

            opacity: 0;
        }
        
        .sidebar-toggle.active span:nth-child(3) {
            transform: translateY(-6px) rotate(-45deg);
        }

            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            display: none;

            display: block;
            animation: fadeIn 0.3s ease-out;
        }
        
        .url-image-container {
            display: flex;
            align-items: center;
            margin-left: 10px;
        }
        
        .url-image-thumbnail {
            width: 30px;
            height: 30px;
            object-fit: cover;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.2s ease;
            border: 1px solid var(--border-color);
        }
        
        .url-image-thumbnail:hover {
            transform: scale(1.1);
        }

            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .image-input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

            max-height: 200px;
            object-fit: contain;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            background: var(--hover-bg);
            display: none;

            left: 0;
            right: 0;
            bottom: 0;

            z-index: 2000;

            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            animation: scaleIn 0.3s ease-out;
        }

            top: 20px;
            right: 20px;

            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s ease;

        }

            from { opacity: 0; }

            from {

            to { 
                opacity: 1;
                transform: translateY(0);
            }

            from {

                transform: scale(0.9);
            }
            to {

            let urls = defaultData.urls;

            let isDarkMode = localStorage.getItem('dark_mode') === 'true';
            let currentCategory = localStorage.getItem('currentCategory') || '';

            if (isDarkMode) {
                document.body.classList.add('dark-mode');
            }

            function renderCategories() {
                categoriesContainer.innerHTML = '';
                
                const uncategorizedPill = document.createElement('div');
                uncategorizedPill.className = `category-pill ${currentCategory === '' ? 'active' : ''}`;
                uncategorizedPill.textContent = '未分类';
                uncategorizedPill.addEventListener('click', () => {
                    currentCategory = '';
                    localStorage.setItem('currentCategory', currentCategory);
                    renderCategories();
                    renderUrls();
                });
                categoriesContainer.appendChild(uncategorizedPill);
                
                categories.forEach(category => {
                    const pill = document.createElement('div');
                    pill.className = `category-pill ${currentCategory === category ? 'active' : ''}`;
                    pill.innerHTML = `
                        ${category}
                        <span class="category-count">(${urls.filter(url => url.category === category).length})</span>
                    `;
                    pill.addEventListener('click', () => {
                        currentCategory = category;
                        localStorage.setItem('currentCategory', currentCategory);
                        renderCategories();
                        renderUrls();
                    });
                    categoriesContainer.appendChild(pill);
                });
            }

            function renderUrls() {
                urlList.innerHTML = '';
                const filteredUrls = currentCategory ? 
                    urls.filter(url => url.category === currentCategory) : 
                    urls.filter(url => !url.category || url.category === '');
                    
                if (filteredUrls.length === 0) {
                    const emptyMessage = document.createElement('li');
                    emptyMessage.textContent = '暂无网址';
                    emptyMessage.style.textAlign = 'center';
                    emptyMessage.style.padding = '30px 15px';
                    emptyMessage.style.color = 'var(--gray-color)';
                    urlList.appendChild(emptyMessage);
                    return;
                }
                
                filteredUrls.forEach((item, index) => {
                    const li = document.createElement('li');
                    li.className = 'url-item';
                    li.innerHTML = `
                        <div class="url-content">
                            <a href="#" class="url-name" data-url="${item.url}">${item.name}</a>
                            <span class="url-description">${item.description || ''}</span>
                            <div>
                                ${item.category ? `<span class="url-category">${item.category}</span>` : ''}
                                <span class="url-time">${item.createdTime || ''}</span>
                            </div>
                        </div>
                        <div class="url-actions">
                            <button class="icon-btn yandex-btn" data-url="${item.url}">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16">
                                    <path d="M6 0a6 6 0 1 1 0 12A6 6 0 0 1 6 0zM5 6a1 1 0 1 0 2 0 1 1 0 0 0-2 0zm3 0a1 1 0 1 0 2 0 1 1 0 0 0-2 0z"/>
                                </svg>
                            </button>
                            ${item.imageUrl ? `
                                <div class="url-image-container">
                                    <img src="${item.imageUrl}" alt="缩略图" class="url-image-thumbnail" data-image="${item.imageUrl}">
                                </div>
                            ` : ''}
                        </div>
                    `;
                    urlList.appendChild(li);
                });

                document.querySelectorAll('.url-name').forEach(link => {
                    link.addEventListener('click', function(e) {
                        e.preventDefault();
                        const url = this.getAttribute('data-url');
                        if (url) {
                            window.open(url, '_self');
                        }
                    });
                });
                
                document.querySelectorAll('.yandex-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const url = this.getAttribute('data-url');
                        if (url) {
                            const yandexUrl = `https://yandex.eu/search/?text=${encodeURIComponent(url)}&lr=109366`;
                            window.open(yandexUrl, '_blank');
                        }
                    });
                });
                
                document.querySelectorAll('.url-image-thumbnail').forEach(img => {
                    img.addEventListener('click', function() {
                        const imageUrl = this.getAttribute('data-image');
                        showFullscreenImage(imageUrl);
                    });
                });
            }

            function showFullscreenImage(imageUrl) {
                const modal = document.createElement('div');
                modal.className = 'fullscreen-image-modal';
                modal.innerHTML = `
                    <img src="${imageUrl}" alt="全屏图片" class="fullscreen-image">
                    <button class="close-fullscreen">×</button>
                `;
                
                document.body.appendChild(modal);
                
                modal.querySelector('.close-fullscreen').addEventListener('click', function() {
                    document.body.removeChild(modal);
                });
                
                modal.addEventListener('click', function(e) {
                    if (e.target === modal) {
                        document.body.removeChild(modal);
                    }
                });
            }

            function toggleDarkMode() {
                isDarkMode = !isDarkMode;
                document.body.classList.toggle('dark-mode');
                localStorage.setItem('dark_mode', isDarkMode);
                closeSidebar();
            }
            
            function toggleSidebar() {
                sidebarToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                sidebarOverlay.classList.toggle('active');
            }
            
            function closeSidebar() {
                sidebarToggle.classList.remove('active');
                sidebar.classList.remove('active');
                sidebarOverlay.classList.remove('active');
            }

            // 事件监听
            sidebarToggle.addEventListener('click', toggleSidebar);
            
            sidebarOverlay.addEventListener('click', closeSidebar);
            
            darkModeBtn.addEventListener('click', toggleDarkMode);

            const randomBtn = document.getElementById('randomSiteBtn');
            if (randomBtn) {

                    closeSidebar();

                    const validUrls = urls.filter(item => item.url && item.url.trim() !== '');
                    if (validUrls.length > 0) {
                        const randomIndex = Math.floor(Math.random() * validUrls.length);
                        const randomUrl = validUrls[randomIndex].url;
                        // 在新标签页打开随机网址（与Yandex按钮行为一致，避免覆盖当前页面）
                        window.open(randomUrl, '_blank');

                    // 无有效网址时什么也不做，无提示
                });
            }
            
            renderCategories();

        (function() {
            // 确保DOM加载完成再操作
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initSupabase);
            } else {
                initSupabase();
            }

            function initSupabase() {
                // 替换成你的真实值！从 Supabase Dashboard → Settings → API 复制
                const supabaseUrl = 'https://waxxkfworjcrukcgbsf.supabase.co';  // 你的 project-ref
                const supabaseAnonKey = '你的 anon public key （很长一串）';   // 从 API 页复制 anon key — 记得替换！

                // 注意：CDN 导出的是 supabase 对象，使用 supabase.createClient
                const supabaseClient = supabase.createClient(supabaseUrl, supabaseAnonKey);

                // 当前用户
                let currentUser = null;

                // 监听登录状态变化（页面加载时/登录后自动触发）
                supabaseClient.auth.onAuthStateChange((event, session) => {
                    currentUser = session?.user ?? null;
                    updateUI();  // 更新按钮文字、显示收藏等
                    if (currentUser) {
                        loadMyFavorites();  // 登录后自动加载个人收藏
                    }
                });

                // 更新 UI（登录按钮变退出 + 显示用户名）
                function updateUI() {
                    const loginBtn = document.getElementById('githubLoginBtn');
                    if (!loginBtn) return;

                    if (currentUser) {
                        const username = currentUser.user_metadata?.user_name || currentUser.user_metadata?.name || '用户';
                        loginBtn.textContent = `退出 (${username})`;
                        loginBtn.style.background = 'var(--danger-color)';
                        // 可以在这里显示“我的收藏”分类或额外列表
                    } else {
                        loginBtn.textContent = 'GitHub 登录';
                        loginBtn.style.background = 'var(--primary-color)';
                    }
                }

                // GitHub 登录/退出按钮点击
                async function handleLogin() {
                    if (currentUser) {
                        // 登出
                        await supabaseClient.auth.signOut();
                    } else {
                        // 登录
                        const { error } = await supabaseClient.auth.signInWithOAuth({
                            provider: 'github',
                            options: {
                                redirectTo: window.location.href  // 登录后跳回当前页
                            }
                        });
                        if (error) {
                            console.error('登录失败喵～', error);
                            alert('登录出错了！检查控制台～');
                        }
                    }
                }

                // 右下角浮动收藏按钮（★ 收藏当前页）
                const fab = document.createElement('button');
                fab.id = 'favBtn';
                fab.innerHTML = '★<br>收藏';
                fab.style.position = 'fixed';
                fab.style.bottom = '30px';
                fab.style.right = '30px';
                fab.style.background = 'var(--success-color)';
                fab.style.color = 'white';
                fab.style.border = 'none';
                fab.style.borderRadius = '50%';
                fab.style.width = '70px';
                fab.style.height = '70px';
                fab.style.fontSize = '18px';
                fab.style.cursor = 'pointer';
                fab.style.boxShadow = '0 6px 20px rgba(0,0,0,0.3)';
                fab.style.zIndex = '1000';
                fab.style.textAlign = 'center';
                fab.style.lineHeight = '1.2';
                fab.style.paddingTop = '10px';
                document.body.appendChild(fab);

                fab.addEventListener('click', async () => {
                    if (!currentUser) {
                        alert('喵～先 GitHub 登录才能收藏哦！');
                        return;
                    }

                    // 当前页面信息（可以改成输入框或自动抓取）
                    const name = document.title || 'Ciallo～(∠・ω<)⌒★';
                    const url = window.location.href;
                    const description = prompt('输入描述（可选）：') || '从我的站点收藏';
                    const category = '我的收藏';  // 或让用户选

                    const newFav = {
                        user_id: currentUser.id,
                        name: name,
                        url: url,
                        description: description,
                        category: category,
                        createdTime: new Date().toISOString(),
                        imageUrl: ''  // 可选，如果有图片
                    };

                    const { error } = await supabaseClient.from('favorites').insert([newFav]);

                    if (error) {
                        console.error('收藏失败', error);
                        alert('收藏失败～' + (error.message || '未知错误'));
                    } else {
                        alert('收藏成功！下次登录还能看到～♡');
                        loadMyFavorites();  // 刷新列表
                    }
                });

                // 加载并显示我的收藏（示例：console.log，你可以改成渲染到页面）
                async function loadMyFavorites() {
                    if (!currentUser) return;

                    const { data, error } = await supabaseClient
                        .from('favorites')
                        .select('*')
                        .eq('user_id', currentUser.id)
                        .order('createdTime', { ascending: false });

                    if (error) {
                        console.error('加载收藏失败', error);
                        return;
                    }

                    console.log('我的云收藏列表：', data);

                }

                // 加登录按钮到 header（或 sidebar，随你）
                const header = document.querySelector('.header') || document.body;
                const loginBtn = document.createElement('button');
                loginBtn.id = 'githubLoginBtn';

                loginBtn.style.right = '20px';
                loginBtn.style.top = '15px';
                loginBtn.style.padding = '8px 16px';
                loginBtn.style.background = 'var(--primary-color)';
                loginBtn.style.color = 'white';
                loginBtn.style.border = 'none';
                loginBtn.style.borderRadius = 'var(--border-radius)';
                loginBtn.style.cursor = 'pointer';
                loginBtn.style.zIndex = '10';
                header.appendChild(loginBtn);

                loginBtn.addEventListener('click', handleLogin);

                // 页面加载时检查登录状态
                supabaseClient.auth.getSession().then(({ data: { session } }) => {
                    currentUser = session?.user ?? null;
                    updateUI();
                    if (currentUser) loadMyFavorites();
                });
            }
        })();
